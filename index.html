<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Study — 在线知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* === DESIGN TOKENS === */
:root{--surface-base:#f6f5f4;--surface-white:#fff;--text-primary:#000;--text-medium:#615d59;--text-muted:#a39e98;--brand-blue:#2537b1;--accent-blue:#097fe8;--accent-red:#f64932;--border-subtle:rgba(0,0,0,0.08);--border-hover:rgba(0,0,0,0.16);--radius-card:8px;--radius-pill:9999px;--sidebar-width:280px;--content-max-width:720px;--header-height:52px;--ease:cubic-bezier(0.4,0,0.2,1);--font-ui:'Noto Sans SC','Inter',-apple-system,sans-serif;--font-content:'Noto Serif SC','Georgia',serif;--font-mono:'JetBrains Mono','SF Mono','Fira Code',monospace;--hl-bg:#1e1e2e;--sel:rgba(37,55,177,0.12)}
[data-theme="dark"]{--surface-base:#1a1a1a;--surface-white:#252525;--text-primary:#e8e8e8;--text-medium:#9e9e9e;--text-muted:#666;--brand-blue:#6b9aff;--accent-blue:#4fc3f7;--border-subtle:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.18);--sel:rgba(107,154,255,0.2);--hl-bg:#111118}
[data-lang="en"]{--font-ui:'Inter',-apple-system,sans-serif;--font-content:'Inter','Georgia',serif}
[data-lang="zh-TW"]{--font-ui:'Noto Sans TC','Noto Sans SC','Inter',sans-serif;--font-content:'Noto Serif TC','Noto Serif SC','Georgia',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-ui);color:var(--text-primary);background:var(--surface-base);line-height:1.5;overflow:hidden;height:100vh;transition:background .2s,color .2s}
a{color:var(--brand-blue);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--sel)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-subtle);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}
/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--surface-white);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform .25s var(--ease),background .2s}
#sidebar-header{padding:12px 16px 8px;border-bottom:1px solid var(--border-subtle);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sidebar-logo svg{flex-shrink:0}
.logo-text{font-size:14px;font-weight:600;letter-spacing:-0.15px;line-height:1.3}
.logo-sub{font-size:11px;color:var(--text-muted)}
.sidebar-ctrl{display:flex;gap:6px;align-items:center}
.sidebar-ctrl select{flex:1;font-family:var(--font-ui);font-size:12px;padding:3px 6px;border:1px solid var(--border-subtle);border-radius:var(--radius-card);background:var(--surface-base);color:var(--text-medium);cursor:pointer;outline:none}
.sidebar-ctrl select:hover,.sidebar-ctrl select:focus{border-color:var(--brand-blue)}
#theme-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--radius-card);background:var(--surface-base);color:var(--text-medium);cursor:pointer;flex-shrink:0}
#theme-btn:hover{background:var(--border-subtle);color:var(--text-primary)}
#theme-btn svg{width:14px;height:14px}
/* Search */
#search-area{padding:8px 16px;flex-shrink:0;position:relative}
#search-input-wrapper{display:flex;align-items:center;background:var(--surface-base);border-radius:var(--radius-card);padding:0 10px;height:32px;border:1px solid transparent;transition:border .15s,background .15s;cursor:text}
#search-input-wrapper:focus-within{border-color:var(--brand-blue);background:var(--surface-white)}
#search-input{border:none;background:none;outline:none;font-family:var(--font-ui);font-size:13px;color:var(--text-primary);width:100%;height:100%}
#search-input::placeholder{color:var(--text-muted)}
.search-icon{color:var(--text-muted);flex-shrink:0;width:14px;height:14px;margin-right:6px}
.search-hint{font-size:9px;color:var(--text-muted);background:var(--border-subtle);padding:0 5px;border-radius:3px;margin-left:auto;flex-shrink:0;line-height:18px}
#search-results{position:absolute;top:calc(100% - 2px);left:16px;right:16px;background:var(--surface-white);border:1px solid var(--border-subtle);border-radius:var(--radius-card);max-height:320px;overflow-y:auto;display:none;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
#search-results.active{display:block}
.sr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border-subtle)}
.sr-item:hover{background:var(--surface-base)}
.sr-item:last-child{border-bottom:none}
.sr-item .sr-title{font-size:13px;font-weight:500}
.sr-item .sr-path{font-size:11px;color:var(--text-muted);margin-top:1px}
.sr-item .sr-snippet{font-size:12px;color:var(--text-medium);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sr-empty{padding:15px 12px;text-align:center;color:var(--text-muted);font-size:13px}
/* Sidebar Nav */
#sidebar-nav{flex:1;overflow-y:auto;padding:4px 0 60px}
.nav-section-header{display:flex;align-items:center;padding:5px 16px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;cursor:pointer;user-select:none;gap:4px}
.nav-section-header .chevron{width:10px;height:10px;flex-shrink:0;transition:transform .2s var(--ease)}
.nav-section-header .chevron.open{transform:rotate(90deg)}
.nav-section-items.collapsed{display:none}
.nav-page{display:flex;align-items:center;padding:3px 16px 3px 24px;font-size:13px;color:var(--text-medium);cursor:pointer;user-select:none;text-decoration:none;position:relative}
.nav-page:hover{color:var(--text-primary);background:var(--surface-base);text-decoration:none}
.nav-page.active{color:var(--brand-blue);font-weight:500;background:rgba(37,55,177,0.06)}
[data-theme="dark"] .nav-page.active{background:rgba(107,154,255,.1)}
.nav-page.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--brand-blue);border-radius:0 1px 1px 0}
.nav-page .st-badge{display:inline-block;font-size:9px;padding:0 5px;border-radius:3px;margin-left:auto;line-height:16px}
.st-badge.c{background:#e3f6e8;color:#0b7e3d}
.st-badge.l{background:#fef3d9;color:#b8731a}
.st-badge.p{background:var(--surface-base);color:var(--text-muted)}
[data-theme="dark"] .st-badge.c{background:#1a3a2a;color:#4ade80}
[data-theme="dark"] .st-badge.l{background:#3a2a1a;color:#fbbf24}
.nav-sub .nav-page{padding-left:38px;font-size:12.5px}
.nav-folder-toggle{cursor:pointer}
.nav-folder-toggle svg{transition:transform .2s var(--ease);margin-right:4px;flex-shrink:0}
/* Mobile header */
#mobile-header{display:none;height:var(--header-height);background:var(--surface-white);border-bottom:1px solid var(--border-subtle);align-items:center;padding:0 16px;gap:8px;flex-shrink:0;z-index:50}
#sidebar-toggle{background:none;border:none;cursor:pointer;padding:5px;color:var(--text-medium);display:flex;border-radius:var(--radius-card)}
#sidebar-toggle:hover{background:var(--surface-base)}
#mobile-title{font-size:15px;font-weight:600;flex:1}
#mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90}
#mobile-overlay.active{display:block}
/* Content */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surface-white);min-width:0;transition:background .2s}
#breadcrumb{display:flex;align-items:center;padding:14px 40px 0;font-size:12px;color:var(--text-muted);gap:5px;flex-shrink:0;flex-wrap:wrap}
#breadcrumb a{color:var(--text-muted)}
#breadcrumb a:hover{color:var(--brand-blue)}
#breadcrumb .sep{color:var(--text-muted);font-size:10px}
#breadcrumb .cur{color:var(--text-medium)}
#page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:36px 40px 80px}
#page-container{max-width:var(--content-max-width);margin:0 auto}
#page-nav{margin-top:56px;padding-top:24px;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;gap:20px}
.page-nav-link{display:flex;flex-direction:column;gap:3px;padding:12px 16px;border-radius:var(--radius-card);border:1px solid var(--border-subtle);transition:border-color .15s var(--ease);max-width:240px;text-decoration:none!important}
.page-nav-link:hover{border-color:var(--border-hover)}
.page-nav-link .dir{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.page-nav-link .title{font-size:13px;font-weight:500;color:var(--text-primary)}
.page-nav-link.next{text-align:right;align-items:flex-end}
.page-nav-link.prev{text-align:left;align-items:flex-start}
.page-nav-link.disabled{opacity:.3;pointer-events:none}
/* Markdown content */
.markdown-body{font-size:16px;line-height:1.75;font-family:var(--font-content);word-wrap:break-word}
.markdown-body>*:first-child{margin-top:0}
.markdown-body h1{font-size:30px;font-weight:700;line-height:1.25;letter-spacing:-.4px;margin:0 0 20px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle);font-family:var(--font-ui)}
.markdown-body h2{font-size:21px;font-weight:700;line-height:1.3;margin:36px 0 10px;font-family:var(--font-ui)}
.markdown-body h3{font-size:18px;font-weight:600;line-height:1.4;margin:28px 0 8px;font-family:var(--font-ui)}
.markdown-body h4{font-size:16px;font-weight:600;margin:24px 0 6px;font-family:var(--font-ui)}
.markdown-body p{margin-bottom:14px}
.markdown-body a{color:var(--brand-blue)}
.markdown-body ul,.markdown-body ol{margin:0 0 14px;padding-left:1.5em}
.markdown-body li{margin-bottom:4px}
.markdown-body blockquote{margin:0 0 14px;padding:8px 16px;border-left:3px solid var(--brand-blue);background:var(--surface-base);border-radius:0 var(--radius-card) var(--radius-card) 0}
.markdown-body blockquote p{margin-bottom:0}
.markdown-body code{font-family:var(--font-mono);font-size:.85em;background:var(--surface-base);padding:2px 6px;border-radius:4px;color:#eb5757;word-break:break-word}
.markdown-body pre{margin:0 0 14px;border-radius:var(--radius-card);overflow:hidden;background:var(--hl-bg);font-size:13px;line-height:1.6}
.markdown-body pre code{font-family:var(--font-mono);font-size:13px;background:none!important;color:#cdd6f4;padding:16px 20px;display:block;overflow-x:auto}
.markdown-body table{width:100%;border-collapse:collapse;margin:0 0 14px;font-size:14px}
.markdown-body th,.markdown-body td{padding:8px 12px;border:1px solid var(--border-subtle);text-align:left}
.markdown-body th{background:var(--surface-base);font-weight:600;font-size:13px}
.markdown-body tr:nth-child(even) td{background:var(--surface-base)}
.markdown-body hr{border:none;border-top:1px solid var(--border-subtle);margin:36px 0}
.markdown-body img{max-width:100%;border-radius:var(--radius-card);margin:14px 0}
.markdown-body input[type="checkbox"]{margin-right:6px;accent-color:var(--brand-blue)}
.markdown-body details{margin:0 0 14px;padding:8px 16px;background:var(--surface-base);border-radius:var(--radius-card);border:1px solid var(--border-subtle)}
.markdown-body summary{font-weight:600;cursor:pointer;user-select:none;font-family:var(--font-ui)}
/* hljs override (Catppuccin Mocha) */
.hljs{background:transparent!important;color:#cdd6f4}
.hljs-keyword{color:#cba6f7}.hljs-string{color:#a6e3a1}.hljs-number{color:#fab387}
.hljs-comment{color:#6c7086;font-style:italic}.hljs-function,.hljs-title{color:#89b4fa}
.hljs-params{color:#f2cdcd}.hljs-built_in{color:#f38ba8}
.hljs-attr,.hljs-property{color:#89dceb}.hljs-type{color:#f9e2af}.hljs-literal{color:#fab387}
.hljs-operator{color:#89dceb}.hljs-variable{color:#f2cdcd}
.hljs-tag,.hljs-name{color:#89b4fa}.hljs-attribute{color:#f9e2af}
/* Code viewer */
.cv-header{display:flex;align-items:center;padding:8px 16px;background:#181825;border-radius:var(--radius-card) var(--radius-card) 0 0;font-size:12px;color:#a6adc8;border-bottom:1px solid rgba(255,255,255,.06)}
.cv-header .lang-badge{font-family:var(--font-mono);font-size:11px;background:rgba(255,255,255,.08);padding:1px 8px;border-radius:var(--radius-pill);margin-left:auto}
.code-viewer pre{margin:0;border-radius:0 0 var(--radius-card) var(--radius-card);background:var(--hl-bg)}
.code-viewer pre code{font-family:var(--font-mono);font-size:13px;line-height:1.6;color:#cdd6f4;padding:16px 20px;display:block;overflow-x:auto}
/* Mermaid */
.mermaid-box{background:var(--surface-white);border:1px solid var(--border-subtle);border-radius:var(--radius-card);padding:20px;overflow-x:auto;margin:0 0 14px;display:flex;justify-content:center}
.mermaid-box svg{max-width:100%;height:auto}
.mermaid-fallback{background:var(--surface-base);border:1px solid var(--border-subtle);border-radius:var(--radius-card);padding:16px;font-family:var(--font-mono);font-size:12px;white-space:pre;overflow-x:auto;margin:0 0 14px}
.mermaid-fallback .mf-label{font-family:var(--font-ui);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
/* Loading/Error */
.loading-state{display:flex;flex-direction:column;align-items:center;padding:80px 0;color:var(--text-muted);gap:12px}
.loading-spinner{width:20px;height:20px;border:2px solid var(--border-subtle);border-top-color:var(--brand-blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{padding:80px 0;text-align:center;color:var(--accent-red)}
.error-state .err-msg{font-size:14px}
/* Welcome */
#welcome{max-width:580px;margin:0 auto;padding:60px 0}
#welcome h1{font-size:26px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px;font-family:var(--font-ui)}
#welcome p{color:var(--text-medium);font-size:15px;margin-bottom:28px;font-family:var(--font-content)}
.wg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wc{border:1px solid var(--border-subtle);border-radius:var(--radius-card);padding:14px;cursor:pointer;transition:border-color .15s var(--ease);text-decoration:none!important;display:block}
.wc:hover{border-color:var(--brand-blue)}
.wc .wci{font-size:18px;margin-bottom:6px;display:block}
.wc .wct{font-size:14px;font-weight:600;color:var(--text-primary)}
.wc .wcd{font-size:12px;color:var(--text-medium);margin-top:3px;font-family:var(--font-content)}
/* Responsive */
@media(max-width:919px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #mobile-header{display:flex}
  #app{flex-direction:column}
  #content{height:calc(100vh - var(--header-height))}
  #breadcrumb{padding:8px 16px 0}#page-scroll{padding:20px}
  #page-nav{flex-direction:column}.page-nav-link{max-width:100%}
  .wg{grid-template-columns:1fr}
}
@media(max-width:600px){
  .markdown-body h1{font-size:24px}.markdown-body h2{font-size:19px}
  #page-scroll{padding:16px 16px 40px}
}
/* GSAP init */
.gsap-fade{opacity:0;transform:translateY(12px)}
</style>
</head>
<body>
<div id="app">
<header id="mobile-header">
<button id="sidebar-toggle" aria-label="Toggle sidebar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<span id="mobile-title">AI Agent Study</span>
</header>
<div id="mobile-overlay"></div>
<aside id="sidebar" role="navigation" aria-label="Navigation">
<div id="sidebar-header">
<div class="sidebar-logo">
<svg width="20" height="20" viewBox="0 0 256 256" fill="none"><rect x="32" y="32" width="192" height="192" rx="28" fill="var(--brand-blue)"/><path d="M96 96h64M96 128h48M96 160h32" stroke="#fff" stroke-width="12" stroke-linecap="round"/></svg>
<div><div class="logo-text">AI Agent Study</div><div class="logo-sub" id="logo-sub">从零学习 AI Agent 开发</div></div>
</div>
<div class="sidebar-ctrl">
<select id="lang-select" aria-label="Language">
<option value="zh-CN">简体中文</option>
<option value="zh-TW">繁體中文</option>
<option value="en">English</option>
</select>
<button id="theme-btn" aria-label="Toggle theme">
<svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
<svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
</div>
</div>
<div id="search-area">
<div id="search-input-wrapper">
<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" id="search-input" placeholder="搜索文档…" autocomplete="off">
<span class="search-hint">&#x2318;K</span>
</div>
<div id="search-results"></div>
</div>
<div id="file-notice" style="display:none;margin:8px 16px;padding:8px 10px;border-radius:8px;background:#fef3d9;color:#b8731a;font-size:12px;line-height:1.4">⚠️ 当前以 file:// 打开，内容无法加载。<br>运行 <code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;font-size:11px">./serve.ps1</code> 启动本地服务器</div><nav id="sidebar-nav"></nav>
</aside>
<main id="content">
<div id="breadcrumb"></div>
<div id="page-scroll">
<div id="page-container"></div>
</div>
</main>
</div>

async function loadPage(path){

function rM(container){

    const pre=block.closest('pre');if(!pre)return;
    const txt=block.textContent.trim();if(!txt)return;

    const fail=()=>{pre.outerHTML='<div class="mermaid-fallback"><div class="mf-label">&#x1F4CA; Diagram</div>'+esc(txt)+'</div>'};

  const top=res.slice(0,15),i=I18N[lang];
  if(top.length===0)rl.innerHTML='<div class="sr-empty">'+i.se+'</div>';
  else rl.innerHTML=top.map(r=>'<div class="sr-item" onclick="event.stopPropagation();loadPage(\''+r.path+'\')"><div class="sr-title">'+esc(r.title)+'</div><div class="sr-path">'+esc(r.path)+'</div><div class="sr-snippet">'+esc(r.snippet)+'</div></div>').join('');
  rl.classList.add('active');
}
// === MOBILE ===
function openM(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobile-overlay').classList.add('active')}
function closeM(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobile-overlay').classList.remove('active')}
// === INIT ===
function init(){var fn=document.getElementById('file-notice');if(fn)fn.style.display=location.protocol==='file:'?'block':'none';
  const sL=getP('pref-lang','zh-CN'),sT=getP('pref-theme','light');
  applyLang(sL);setTheme(sT);
  const h=location.hash.replace(/^#/,'');if(h)loadPage(decodeURIComponent(h));else showWelcome();
  const si=document.getElementById('search-input');let st;
  si.addEventListener('input',()=>{clearTimeout(st);st=setTimeout(()=>perfS(si.value),200)});
  si.addEventListener('keydown',(e)=>{if(e.key==='Escape'){si.blur();document.getElementById('search-results').classList.remove('active')}});
  document.addEventListener('click',(e)=>{if(!e.target.closest('#search-area'))document.getElementById('search-results').classList.remove('active')});
  document.addEventListener('keydown',(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();si.focus()}});
  document.getElementById('sidebar-toggle').addEventListener('click',openM);
  document.getElementById('mobile-overlay').addEventListener('click',closeM);
  document.getElementById('theme-btn').addEventListener('click',toggleTheme);
  document.getElementById('lang-select').addEventListener('change',(e)=>applyLang(e.target.value));
  window.addEventListener('popstate',()=>{const h=location.hash.replace(/^#/,'');if(h)loadPage(decodeURIComponent(h));else showWelcome()});
}
// === LOAD CDN DEPS ===
(function(){
  const deps=[
    {src:'https://cdn.jsdelivr.net/npm/marked/marked.min.js',ck:'marked'},
    {src:'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js',ck:'hljs'},
    {src:'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js',ck:'mermaid'},
    {src:'https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js',ck:'gsap'},
  ];
  let ld=0,st=false;
  function cb(){ld++;if(ld>=deps.length&&!st){st=true;init();}}
  for(const d of deps){
    try{
      if(window[d.ck]){cb();continue;}
      const s=document.createElement('script');s.src=d.src;s.onload=cb;s.onerror=()=>{console.warn('CDN fail',d.src);cb()};
      document.head.appendChild(s);
    }catch(e){console.warn('Script inject fail',d.src);cb();}
  }
  setTimeout(function(){if(!st){st=true;console.warn('CDN timeout');init()}},8000);
})();
// === FALLBACK: CDN skip-then-retry ===
(function f2(){if(typeof init!=='function'){setTimeout(f2,300);return}if(!window.marked&&!window.hljs){console.warn('CDN unavailable, init anyway');init()}})();
</script>
